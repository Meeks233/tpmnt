name: Build & Publish

# Dependency-based distribution: the release artifacts are proper .deb (apt) and
# .rpm (dnf/zypper) packages that declare the runtime tools tpmnt orchestrates
# (cryptsetup, systemd, hdparm, gnupg, …). No more standalone static binaries —
# users install through their package manager so dependencies come along.
#
# Channels:
#   * Every push to master/main  -> rolling PRE-RELEASE (tag `edge`).
#   * A pushed version tag `v*`  -> stable RELEASE (that tag).
on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Decide which channel this run publishes to.
  channel:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.c.outputs.tag }}
      name: ${{ steps.c.outputs.name }}
      prerelease: ${{ steps.c.outputs.prerelease }}
    steps:
      - id: c
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_TYPE" = "tag" ]; then
            {
              echo "tag=$REF_NAME"
              echo "name=tpmnt $REF_NAME"
              echo "prerelease=false"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tag=edge"
              echo "name=tpmnt edge (rolling pre-release)"
              echo "prerelease=true"
            } >> "$GITHUB_OUTPUT"
          fi

  # Debian packages — the apt/distro path. Built for both edge pushes and stable
  # tags. Cross-compiled for the two arches users deploy to.
  deb:
    needs: channel
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: deb-${{ matrix.target }}
      - name: Install aarch64 cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          {
            echo '[target.aarch64-unknown-linux-gnu]'
            echo 'linker = "aarch64-linux-gnu-gcc"'
          } >> .cargo/config.toml
      - uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2
        with:
          tool: cargo-deb
      - name: Build .deb
        env:
          TARGET: ${{ matrix.target }}
        # man/tpmnt.1 is committed; cargo-deb builds the target binary itself.
        run: cargo deb --target "$TARGET" --output "tpmnt-${TARGET}.deb"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: deb-${{ matrix.target }}
          path: tpmnt-*.deb
          if-no-files-found: error

  # RPM packages — the dnf/zypper path. Built for edge pushes and stable tags.
  rpm:
    needs: channel
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: rpm-${{ matrix.target }}
      - name: Install aarch64 cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          {
            echo '[target.aarch64-unknown-linux-gnu]'
            echo 'linker = "aarch64-linux-gnu-gcc"'
          } >> .cargo/config.toml
      - uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2
        with:
          tool: cargo-generate-rpm
      - name: Build binary + .rpm
        env:
          TARGET: ${{ matrix.target }}
        # man/tpmnt.1 is committed (can't run a cross-built binary on this runner).
        run: |
          cargo build --release --target "$TARGET"
          # auto-req disabled: glibc is always present; we declare the tool deps ourselves.
          cargo generate-rpm --target "$TARGET" --auto-req disabled --output "tpmnt-${TARGET}.rpm"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rpm-${{ matrix.target }}
          path: tpmnt-*.rpm
          if-no-files-found: error

  publish:
    needs: [channel, deb, rpm]
    if: ${{ always() && (needs.deb.result == 'success' || needs.rpm.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: |
          cd dist
          sha256sum tpmnt-* > SHA256SUMS
      - name: Publish to ${{ needs.channel.outputs.tag }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ needs.channel.outputs.tag }}
          name: ${{ needs.channel.outputs.name }}
          prerelease: ${{ needs.channel.outputs.prerelease }}
          # Pre-releases should never become the "Latest" pointer.
          make_latest: ${{ needs.channel.outputs.prerelease == 'false' }}
          # Replace assets each run so the rolling `edge` release stays clean.
          files: dist/**

  # Software-source publishing — turns the loose .deb/.rpm assets into signed apt
  # and dnf/zypper repositories served from GitHub Pages, so users can:
  #   apt install tpmnt   /   dnf install tpmnt
  #
  # STABLE ONLY: the `edge` rolling channel is intentionally NOT published here —
  # it stays in the GitHub Release assets so it can never pollute the stable repo.
  # The repo is rebuilt from scratch every release (few packages → full rebuild is
  # simplest and idempotent) and force-pushed to the orphan `gh-pages` branch.
  #
  # Requires two repo secrets (see docs/packaging.md):
  #   GPG_PRIVATE_KEY  — armored OR base64-of-armored private (sub)key for signing
  #   GPG_PASSPHRASE   — its passphrase (empty string if the key has none)
  pages:
    needs: [channel, deb, rpm]
    if: ${{ needs.channel.outputs.prerelease == 'false' && needs.deb.result == 'success' && needs.rpm.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Install repo tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro createrepo-c rpm gnupg

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true

      # Everything that needs the signing key lives in ONE step so the gpg-agent
      # (and its preset passphrase cache) stays alive across apt + rpm signing.
      - name: Build signed apt + rpm repositories
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          BASE_URL: https://meeks233.github.io/tpmnt
          TAG: ${{ needs.channel.outputs.tag }}
        run: |
          set -euo pipefail

          # --- isolated, throwaway keyring -----------------------------------
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          chmod 700 "$GNUPGHOME"
          cat > "$GNUPGHOME/gpg-agent.conf" <<'EOF'
          allow-preset-passphrase
          default-cache-ttl 7200
          max-cache-ttl 7200
          EOF
          gpgconf --kill gpg-agent >/dev/null 2>&1 || true

          # Secret may be stored armored or base64-of-armored; accept either.
          if ! printf '%s' "$GPG_PRIVATE_KEY" | base64 -d 2>/dev/null | gpg --batch --import 2>/dev/null; then
            printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import
          fi
          KEYID="$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/{print $5; exit}')"
          echo "Signing with key $KEYID"

          # Preset the passphrase into the agent for every secret keygrip so both
          # reprepro (via gpgme) and rpm can sign without an interactive pinentry.
          PRESET="$(find /usr/lib /usr/libexec -name gpg-preset-passphrase 2>/dev/null | head -1)"
          gpg --batch --list-secret-keys --with-keygrip --with-colons \
            | awk -F: '/^grp:/{print $10}' \
            | while read -r grip; do
                "$PRESET" --preset --passphrase "$GPG_PASSPHRASE" "$grip"
              done

          # --- APT repository (reprepro) -------------------------------------
          mkdir -p apt/conf
          cat > apt/conf/distributions <<EOF
          Origin: tpmnt
          Label: tpmnt
          Codename: stable
          Suite: stable
          Components: main
          Architectures: amd64 arm64
          Description: tpmnt stable apt repository
          SignWith: $KEYID
          EOF
          for deb in dist/*.deb; do
            echo "apt: including $deb"
            reprepro -b apt includedeb stable "$deb"
          done

          # --- RPM repository (createrepo_c) ---------------------------------
          # rpm --addsign uses the agent (passphrase already cached); no loopback.
          cat > "$HOME/.rpmmacros" <<EOF
          %_gpg_name $KEYID
          %__gpg_sign_cmd %{__gpg} gpg --batch --no-verbose --no-armor --no-secmem-warning -u "%{_gpg_name}" -sbo %{__signature_filename} --digest-algo sha256 %{__plaintext_filename}
          EOF
          mkdir -p rpm
          cp dist/*.rpm rpm/
          for r in rpm/*.rpm; do
            echo "rpm: signing $r"
            rpm --addsign "$r"
          done
          createrepo_c rpm
          # Detached, armored signature of repomd.xml for repo_gpgcheck=1.
          gpg --batch --yes --detach-sign --armor \
            -u "$KEYID" -o rpm/repodata/repomd.xml.asc rpm/repodata/repomd.xml

          # --- assemble the Pages site ---------------------------------------
          # apt lives at the site root (dists/ + pool/); rpm under /rpm.
          mkdir -p site
          cp -r apt/dists site/dists
          cp -r apt/pool  site/pool
          cp -r rpm        site/rpm
          gpg --armor --export "$KEYID" > site/gpg.key
          touch site/.nojekyll   # keep underscore/dot paths that Jekyll would strip

          cat > site/tpmnt.repo <<EOF
          [tpmnt]
          name=tpmnt
          baseurl=$BASE_URL/rpm
          enabled=1
          gpgcheck=1
          repo_gpgcheck=1
          gpgkey=$BASE_URL/gpg.key
          EOF

          cat > site/index.html <<EOF
          <!doctype html><meta charset="utf-8"><title>tpmnt package repository</title>
          <h1>tpmnt package repository</h1>
          <p>Signed apt &amp; dnf/zypper repositories for <a href="https://github.com/Meeks233/tpmnt">tpmnt</a> (stable channel, built from tag <code>$TAG</code>).</p>
          <h2>Debian / Ubuntu (apt)</h2>
          <pre>curl -fsSL $BASE_URL/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/tpmnt.gpg
          echo "deb [signed-by=/usr/share/keyrings/tpmnt.gpg] $BASE_URL stable main" | sudo tee /etc/apt/sources.list.d/tpmnt.list
          sudo apt update &amp;&amp; sudo apt install tpmnt</pre>
          <h2>Fedora / openSUSE (dnf/zypper)</h2>
          <pre>sudo dnf config-manager --add-repo $BASE_URL/tpmnt.repo
          sudo dnf install tpmnt</pre>
          EOF

          # Don't leak any key material into the published tree.
          rm -rf "$GNUPGHOME"

      - name: Deploy to gh-pages (full rebuild, force-push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.channel.outputs.tag }}
        run: |
          set -euo pipefail
          cd site
          git init -q
          git checkout -q -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Publish tpmnt repository for $TAG"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git" gh-pages
