# release-plz configuration. See https://release-plz.dev/docs/config
#
# tpmnt is a single crate. release-plz derives the next version from Conventional
# Commits, updates Cargo.toml + CHANGELOG.md in a Release PR, and on merge publishes
# to crates.io and pushes the git tag.
[workspace]
# Match the existing release.yml trigger (`tags: ["v*"]`) so the tag release-plz
# pushes drives the deb/rpm + signed-repo build. Default would be "v{{ version }}"
# for a single crate, but pin it explicitly so the contract is obvious.
git_tag_name = "v{{ version }}"

# release.yml owns the GitHub Release (it attaches the .deb/.rpm/SHA256SUMS assets).
# release-plz only creates the tag; it must not create a competing empty release.
git_release_enable = false
